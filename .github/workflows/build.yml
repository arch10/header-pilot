name: Build

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump before build"
        required: true
        default: none
        type: choice
        options:
          - none
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # Fetch full history + a token that can push tags/commits back.
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Bump version
        if: ${{ inputs.version_bump != 'none' }}
        id: bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version ${{ inputs.version_bump }} --no-git-tag-version)
          echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          git add package.json package-lock.json
          git commit -m "Bump version to ${NEW_VERSION}"
          git tag "${NEW_VERSION}"
          git push origin HEAD:${{ github.ref_name }}
          git push origin "${NEW_VERSION}"

      - run: npm run build

      - uses: actions/upload-artifact@v5
        with:
          name: header-pilot-dist${{ steps.bump.outputs.new_version && format('-{0}', steps.bump.outputs.new_version) || '' }}
          path: dist

      - name: Package release assets
        if: ${{ inputs.version_bump != 'none' }}
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          VERSION="${{ steps.bump.outputs.new_version }}"
          zip -r "header-pilot-${VERSION}.zip" dist
          echo "$CRX_PRIVATE_KEY" > crx-key.pem
          google-chrome --headless --pack-extension=dist --pack-extension-key=crx-key.pem
          mv dist.crx "header-pilot-${VERSION}.crx"
          rm -f crx-key.pem

      - name: Create GitHub Release
        if: ${{ inputs.version_bump != 'none' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.new_version }}"
          gh release create "${VERSION}" \
            "header-pilot-${VERSION}.zip" \
            "header-pilot-${VERSION}.crx" \
            --title "${VERSION}" \
            --generate-notes \
            --latest
